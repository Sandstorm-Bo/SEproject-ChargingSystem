<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理端 - 充电桩系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
            min-height: 100vh;
            padding: 2rem;
            color: white;
        }
        .container { max-width: 1600px; margin: 0 auto; }
        .header {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            padding: 2rem;
            border-radius: 20px;
            margin-bottom: 2rem;
            text-align: center;
            box-shadow: 0 20px 60px rgba(99,102,241,0.3);
        }
        .header h1 { font-size: 2.5rem; margin-bottom: 0.5rem; }
        .main-grid {
            display: grid;
            grid-template-columns: 2.5fr 1fr;
            gap: 2rem;
        }
        .card {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            color: #1e293b;
        }
        .piles-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .pile-card {
            background: white;
            border: 3px solid #e5e7eb;
            border-radius: 16px;
            padding: 1.5rem;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }
        .pile-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.15);
        }
        .pile-card.charging {
            border-color: #10b981;
            background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
        }
        .pile-card.fault {
            border-color: #ef4444;
            background: linear-gradient(135deg, #fef2f2 0%, #fee2e2 100%);
        }
        .pile-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        .pile-id { font-size: 1.5rem; font-weight: 800; }
        .pile-status {
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.875rem;
            font-weight: 600;
        }
        .pile-status.charging { background: #10b981; color: white; }
        .pile-status.available { background: #3b82f6; color: white; }
        .pile-status.fault { background: #ef4444; color: white; }
        .progress-bar {
            width: 100%;
            height: 12px;
            background: #e5e7eb;
            border-radius: 6px;
            overflow: hidden;
            margin: 0.75rem 0;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #10b981, #6366f1);
            transition: width 0.5s;
        }
        .pile-stats {
            display: flex;
            justify-content: space-between;
            font-size: 0.875rem;
            margin-top: 0.75rem;
        }
        .slider {
            width: 100%;
            height: 8px;
            border-radius: 4px;
            background: #e5e7eb;
            outline: none;
            -webkit-appearance: none;
        }
        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            cursor: pointer;
        }
        .btn {
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-danger {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
        }
        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(239,68,68,0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="srvBar" style="margin-bottom:1rem;padding:.6rem 1rem;background:rgba(0,0,0,.28);border-radius:10px;display:flex;gap:.5rem;align-items:center;font-size:.85rem;color:#fff;flex-wrap:wrap;">
            <span>🌐 服务器地址</span>
            <input id="serverAddr" placeholder="如 192.168.1.10:8080 或 http://host:8080" style="flex:1;min-width:220px;padding:.45rem .6rem;border-radius:8px;border:1px solid #cbd5e1;color:#1e293b;">
            <button onclick="applyServer()" style="padding:.45rem 1.1rem;border:none;border-radius:8px;background:#6366f1;color:#fff;font-weight:700;cursor:pointer;">连接</button>
            <span id="srvState" style="opacity:.9;"></span>
        </div>
        <div class="header">
            <h1>⚡ 充电桩管理系统</h1>
            <p>实时监控 · 智能调度</p>
        </div>

        <div class="main-grid">
            <div class="card">
                <h2 style="margin-bottom: 1.5rem;">⚡ 快充区</h2>
                <div class="piles-grid" id="fastPiles"></div>
                <h2 style="margin-bottom: 1.5rem;">🔌 慢充区</h2>
                <div class="piles-grid" id="tricklePiles"></div>
            </div>

            <div style="display: flex; flex-direction: column; gap: 1.5rem;">
                <div class="card">
                    <h3 style="margin-bottom: 1rem;">⏱ 时间流速</h3>
                    <input type="range" class="slider" id="timeSlider" min="1" max="4" value="2">
                    <div style="display: flex; justify-content: space-between; font-size: 0.75rem; color: #64748b; margin-top: 0.5rem;">
                        <span>1x</span><span>10x</span><span>60x</span><span>即时</span>
                    </div>
                    <div style="text-align: center; padding: 1.5rem; background: #eef2ff; border-radius: 12px; margin-top: 1rem;">
                        <div style="font-size: 2.5rem; font-weight: 800; color: #6366f1;" id="currentSpeed">10x</div>
                    </div>
                </div>

                <div class="card">
                    <h3 style="margin-bottom: 1rem;">📊 统计</h3>
                    <div style="display: grid; gap: 1rem;">
                        <div style="padding: 1rem; background: #f8f9ff; border-radius: 8px; text-align: center;">
                            <div style="font-size: 2rem; font-weight: 800; color: #6366f1;" id="statCharging">0</div>
                            <div style="font-size: 0.875rem; color: #64748b;">充电中</div>
                        </div>
                        <div style="padding: 1rem; background: #f8f9ff; border-radius: 8px; text-align: center;">
                            <div style="font-size: 2rem; font-weight: 800; color: #6366f1;" id="statWaiting">0</div>
                            <div style="font-size: 0.875rem; color: #64748b;">等待</div>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <button class="btn btn-danger" onclick="resetDB()">🗑️ 重置数据库</button>
                </div>
            </div>
        </div>
    </div>

    <script src="lib/sockjs.min.js"></script>
    <script src="lib/stomp.min.js"></script>
    <script>
        const SRV_KEY = 'serverBase';
        function serverBase() { return localStorage.getItem(SRV_KEY) || 'http://localhost:8080'; }
        function applyServer() {
            let v = (document.getElementById('serverAddr').value || '').trim();
            if (v) { if (!/^https?:\/\//i.test(v)) v = 'http://' + v; localStorage.setItem(SRV_KEY, v.replace(/\/+$/, '')); }
            else { localStorage.removeItem(SRV_KEY); }
            location.reload();
        }
        window.addEventListener('DOMContentLoaded', () => {
            const el = document.getElementById('serverAddr'); if (el) el.value = serverBase();
        });

        const API = serverBase() + '/api';
        let stompClient;

        function connect() {
            const socket = new SockJS(serverBase() + '/api/ws');
            stompClient = Stomp.over(socket);
            stompClient.connect({}, () => {
                const s = document.getElementById('srvState'); if (s) { s.textContent = '已连接 ' + serverBase(); s.style.color = '#86efac'; }
                stompClient.subscribe('/topic/status', (msg) => {
                    const data = JSON.parse(msg.body);
                    updateUI(data);
                });
            }, () => {
                const s = document.getElementById('srvState'); if (s) { s.textContent = '连接失败：' + serverBase(); s.style.color = '#fca5a5'; }
            });
        }

        function updateUI(data) {
            if (!data?.piles) return;

            const fast = document.getElementById('fastPiles');
            const trickle = document.getElementById('tricklePiles');
            fast.innerHTML = '';
            trickle.innerHTML = '';

            data.piles.forEach(p => {
                const card = document.createElement('div');
                const status = p.status === 'BUSY' ? 'charging' :
                              p.status === 'FAULT' ? 'fault' : 'available';
                const text = p.status === 'BUSY' ? '充电中' :
                            p.status === 'FAULT' ? '故障' : '空闲';

                card.className = `pile-card ${status}`;
                card.innerHTML = `
                    <div class="pile-header">
                        <div class="pile-id">${p.pileId}</div>
                        <div class="pile-status ${status}">${text}</div>
                    </div>
                    ${p.status === 'BUSY' && p.currentCarId ? `
                        <div style="font-weight: 600; margin-top: 1rem;">🚗 ${p.currentCarId}</div>
                        <div class="progress-bar"><div class="progress-fill" style="width: ${p.chargeProgress||0}%"></div></div>
                        <div class="pile-stats">
                            <span>${p.chargeProgress||0}%</span>
                            <span>¥${(p.currentCost||0).toFixed(1)}</span>
                        </div>
                    ` : ''}
                `;

                (p.pileType === 'FAST' ? fast : trickle).appendChild(card);
            });

            const charging = data.piles.filter(p => p.status === 'BUSY').length;
            const waiting = data.piles.reduce((s, p) => s + (p.queueLength || 0), 0);
            document.getElementById('statCharging').textContent = charging;
            document.getElementById('statWaiting').textContent = waiting;
        }

        document.getElementById('timeSlider').addEventListener('input', (e) => {
            const labels = ['1x', '10x', '60x', '即时'];
            document.getElementById('currentSpeed').textContent = labels[e.target.value - 1];
        });

        async function resetDB() {
            if (!confirm('确定重置？')) return;
            try {
                await fetch(`${API}/monitor/reset`, {method: 'POST'});
                alert('已重置');
            } catch (e) {
                alert('失败');
            }
        }

        connect();
    </script>
</body>
</html>
